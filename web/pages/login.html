<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>RIFFHUB - Login</title>
  <link rel="stylesheet" type="text/css" href="../css/style.css">
</head>
<body>
  <div class="pagina-marco">
    <h1>Inicia sessió / Crea compte</h1>
    <p class="texto-secundario">Demo visual: no valida usuari ni guarda dades.</p>

    <div class="seccion">
      <h2 class="titulo-seccion">Inicia sessió</h2>
      <form action="#" method="POST">
        <p class="texto-secundario">Correu</p>
        <input type="text" name="email" class="campo-busqueda">
        <p class="texto-secundario">Contrasenya</p>
        <input type="password" name="pass" class="campo-busqueda">
        <p>
          <a href="reserves.html" class="boton boton-principal">Entrar (demo)</a>
        </p>
      </form>
    </div>

    <div class="seccion">
      <h2 class="titulo-seccion">Crea compte</h2>
      <form action="#" method="POST">
        <p class="texto-secundario">Nom</p>
        <input type="text" name="nom" class="campo-busqueda">
        <p class="texto-secundario">Correu</p>
        <input type="text" name="email2" class="campo-busqueda">
        <p class="texto-secundario">Contrasenya</p>
        <input type="password" name="pass2" class="campo-busqueda">
        <p>
          <a href="reserves.html" class="boton boton-principal">Crear (demo)</a>
        </p>
      </form>
    </div>

  </div>
</body>
</html>
